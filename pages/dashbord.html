<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de bord - Gestion d'Entrepôt</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/dashbord.css">

</head>
<body class="pb-4">

    <div class="container px-3 pt-4">

        <header class="d-flex justify-content-between align-items-center mb-4">
            <i class="bi bi-grid-3x3-gap fs-3 text-dark"></i>
            <div class="position-relative">
                <i class="bi bi-bell fs-4 text-dark"></i>
                <span class="position-absolute bg-jaune border border-2 border-white rounded-circle notification-dot"></span>
            </div>
        </header>

        <div class="d-flex align-items-center mb-4">
            <img src="../img/image-12.png" alt="Profil" class="rounded-circle shadow-sm me-3 profil">
            <div>
                <span class="texte-jaune fw-bold">Bonjour 👋,</span>
                <h5 class="fw-bold mb-0 nom">Modou Gningue GUEYE</h5>
                <span class="texte-gris localisation">
                    <i class="bi bi-geo-alt-fill texte-jaune"></i> Diamous
                </span>
            </div>
        </div>

        <div class="row g-3 mb-5">
            <div class="col-6">
                <a href="commandes.html" class="text-decoration-none text-dark">
                    <div class="card border-0 shadow-sm rounded-4 h-100 p-3 position-relative overflow-hidden bg-white">
                        <p class="fw-bold titre-carte mb-5">Commande<br>Anonyme</p>
                        <img src="../img/icone3.png" alt="Icone colis" class="position-absolute bottom-0 start-0 ms-2 mb-2 icone">
                    </div>
                </a>
            </div>
            
            <div class="col-6">
                <div class="card border-0 shadow-sm rounded-4 h-100 p-3 position-relative overflow-hidden bg-white">
                    <p class="fw-bold titre-carte mb-5">Vérification des<br>commandes</p>
                    <img src="../img/icone2.png" alt="Icone téléphone" class="position-absolute bottom-0 end-0 me-2 mb-2 icone">
                </div>
            </div>
        </div>


        <h6 class="fw-bold mb-3 text-bleu">Activités récentes</h6>

        <div class="card border-0 rounded-4 p-3 mb-3 bg-jaune shadow-sm">
            <div class="d-flex align-items-center">
                <div class="bg-white rounded-circle d-flex justify-content-center align-items-center flex-shrink-0" style="width: 50px; height: 50px;">
                    <i class="bi bi-search fs-4" style="color: #667eea;"></i>
                </div>
                <div class="ms-3 flex-grow-1">
                    <p class="mb-0 fw-bold text-card">Vous avez vérifié<br>12 colis</p>
                </div>
                <div class="bg-white rounded-circle d-flex justify-content-center align-items-center flex-shrink-0 opacity-75" style="width: 30px; height: 30px;">
                    <i class="bi bi-chevron-right text-dark small"></i>
                </div>
            </div>
        </div>

        <div class="card border-0 rounded-4 p-3 mb-3 bg-gris-clair shadow-sm">
            <div class="d-flex align-items-center">
                <div class="bg-white rounded-circle d-flex justify-content-center align-items-center flex-shrink-0 shadow-sm" style="width: 50px; height: 50px;">
                    <i class="bi bi-exclamation-square-fill fs-4 text-danger"></i>
                </div>
                <div class="ms-3 flex-grow-1">
                    <p class="mb-0 fw-bold text-card">Défaut d'enregistrement</p>
                    <p class="mb-0 texte-gris">La description</p>
                </div>
                <div class="bg-white rounded-circle d-flex justify-content-center align-items-center flex-shrink-0 shadow-sm" style="width: 30px; height: 30px;">
                    <i class="bi bi-chevron-right text-dark small"></i>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
